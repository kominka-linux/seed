name: Release Wget

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_suffix: linux-x86_64
          - runner: ubuntu-24.04-arm
            asset_suffix: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build standalone wget
        run: cargo build --quiet --profile release-wget --no-default-features --features wget --bin wget

      - name: Prepare binary
        run: |
          mkdir -p dist
          cp target/release-wget/wget "dist/wget-${{ matrix.asset_suffix }}"
          sha256sum "dist/wget-${{ matrix.asset_suffix }}" > "dist/wget-${{ matrix.asset_suffix }}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wget-${{ matrix.asset_suffix }}
          path: |
            dist/wget-${{ matrix.asset_suffix }}
            dist/wget-${{ matrix.asset_suffix }}.sha256
          if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: wget-${{ github.sha }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --notes "Standalone wget binaries built from ${GITHUB_SHA}."
          fi
